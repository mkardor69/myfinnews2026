name: Financial News Bot

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python news_bot.py

      - name: Commit updated state file
        run: |
          git config --global user.name "news-bot"
          git config --global user.email "news-bot@users.noreply.github.com"
          git add sent_news.json
          git diff --quiet --cached || git commit -m "update sent news state [skip ci]"
          git push
